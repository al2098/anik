<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Knitting Garments Management System | Multi-Vendor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-tshirt"></i>
                    <span>Knitting<span class="highlight">Manager</span></span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" data-page="dashboard" class="nav-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" data-page="bill-statement" class="nav-item">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>Bill Statement</span>
                </a>
                <a href="#" data-page="yarn-statement" class="nav-item">
                    <i class="fas fa-thread"></i>
                    <span>Yarn Statement</span>
                </a>
                <a href="#" data-page="payroll" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Payroll</span>
                </a>
                <a href="#" data-page="vendors" class="nav-item">
                    <i class="fas fa-store"></i>
                    <span>Vendors</span>
                </a>
                <a href="#" data-page="reports" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
                <a href="#" data-page="settings" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="vendor-selector">
                    <label>Current Vendor</label>
                    <select id="vendorSelect">
                        <option value="asrotex">ASROTEX</option>
                        <option value="anik">ANIK KNITTING</option>
                    </select>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-title">
                    <h1 id="pageTitle">Dashboard</h1>
                    <p id="pageSubtitle">Welcome back, overview of your business</p>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" id="exportBtn" title="Export Data">
                        <i class="fas fa-download"></i>
                    </button>
                    <button class="btn-icon" id="uploadBtn" title="Upload Data">
                        <i class="fas fa-upload"></i>
                    </button>
                    <div class="user-menu">
                        <img src="https://ui-avatars.com/api/?background=2D6A4F&color=fff&name=Admin" alt="Admin">
                    </div>
                </div>
            </header>

            <div class="page-container" id="pageContainer">
                <!-- Dynamic content loaded here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="uploadModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Upload CSV/Excel File</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="upload-area" id="dropZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Drag & drop your file here or click to browse</p>
                    <small>Supports .csv, .xlsx, .xls files</small>
                    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display: none;">
                </div>
                <div class="upload-preview" id="uploadPreview" style="display: none;">
                    <h4>Preview</h4>
                    <div class="preview-table-wrapper">
                        <table class="preview-table" id="previewTable"></table>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelUpload">Cancel</button>
                <button class="btn-primary" id="confirmUpload">Confirm Upload</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script type="module" src="src/main.js"></script>
</body>
</html>
